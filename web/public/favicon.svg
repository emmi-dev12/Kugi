<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18271e"/>
      <stop offset="100%" stop-color="#0b100d"/>
    </linearGradient>
    <linearGradient id="k" x1="9" y1="5" x2="23" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#90c4a0"/>
      <stop offset="55%" stop-color="#5d8a6a"/>
      <stop offset="100%" stop-color="#3a5e46"/>
    </linearGradient>
    <linearGradient id="accent" x1="18" y1="17" x2="24" y2="23" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5d8a6a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2c3a32" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="glow" cx="11" cy="10" r="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5d8a6a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#5d8a6a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="8"/>
    </clipPath>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <g clip-path="url(#clip)">
    <rect width="32" height="32" fill="url(#glow)"/>
    <!-- K spine -->
    <line x1="10" y1="5.5" x2="10" y2="26.5" stroke="url(#k)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- K upper arm -->
    <line x1="10.5" y1="15.5" x2="24" y2="5.5" stroke="url(#k)" stroke-width="4" stroke-linecap="round"/>
    <!-- K lower arm -->
    <line x1="10.5" y1="15.5" x2="24" y2="26.5" stroke="url(#k)" stroke-width="4" stroke-linecap="round"/>
    <!-- Accent block -->
    <rect x="18.5" y="17.5" width="5.5" height="5.5" rx="1.5" fill="url(#accent)" stroke="rgba(93,138,106,0.25)" stroke-width="0.75"/>
    <!-- Hairline border -->
    <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="7.25" stroke="white" stroke-opacity="0.09" stroke-width="1" fill="none"/>
  </g>
</svg>
