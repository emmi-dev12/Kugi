<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#182a1e"/>
      <stop offset="100%" stop-color="#0c110e"/>
    </linearGradient>
    <!-- Spine: bright sage top → deep moss bottom -->
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8fc49f"/>
      <stop offset="100%" stop-color="#3d5c47"/>
    </linearGradient>
    <!-- Upper arm: dark inner → light outer -->
    <linearGradient id="ua" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4a7358"/>
      <stop offset="100%" stop-color="#78ae8a"/>
    </linearGradient>
    <!-- Lower arm: darker, cooler -->
    <linearGradient id="la" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3d5c47"/>
      <stop offset="100%" stop-color="#5d8a6a"/>
    </linearGradient>
    <!-- Ambient glow -->
    <radialGradient id="glow" cx="160" cy="128" r="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5d8a6a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#5d8a6a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="114"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <!-- Ambient glow -->
    <rect width="512" height="512" fill="url(#glow)"/>

    <!--
      K from 3 bento blocks, scaled up 16× from 32px design:
      Spine:      x=80  y=80   w=88  h=352  rx=40
      Arms pivot from (160, 256) — midpoint of spine's right edge
      Arm rect:   x=152 y=216  w=272 h=80   rx=35
      Upper arm:  rotate(-35, 160, 256)
      Lower arm:  rotate(35,  160, 256)
    -->

    <!-- Lower arm block (drawn first, behind spine) -->
    <rect x="152" y="216" width="272" height="80" rx="35"
          fill="url(#la)"
          transform="rotate(35 160 256)"/>

    <!-- Upper arm block -->
    <rect x="152" y="216" width="272" height="80" rx="35"
          fill="url(#ua)"
          transform="rotate(-35 160 256)"/>

    <!-- Spine block (front, covers arm roots) -->
    <rect x="80" y="80" width="88" height="352" rx="40" fill="url(#spine)"/>

    <!-- Specular sheen on spine top -->
    <rect x="80" y="80" width="88" height="52" rx="40" fill="white" fill-opacity="0.14"/>

    <!-- Hairline outer border -->
    <rect x="2" y="2" width="508" height="508" rx="112"
          stroke="white" stroke-opacity="0.08" stroke-width="4" fill="none"/>
  </g>
</svg>
