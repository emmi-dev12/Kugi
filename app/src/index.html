<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kugi</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230f0f0f'/%3E%3Crect x='5' y='5' width='10' height='10' rx='3' fill='%234f7cff'/%3E%3Crect x='17' y='5' width='10' height='10' rx='3' fill='%238b5cf6'/%3E%3Crect x='5' y='17' width='10' height='10' rx='3' fill='%2310b981'/%3E%3Crect x='17' y='17' width='10' height='10' rx='3' fill='%23f43f5e'/%3E%3C/svg%3E" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --surface3: #202020;
      --surface4: #282828;
      --border: #1e1e1e;
      --border2: #2a2a2a;
      --text: #f2f2f2;
      --text-muted: #666;
      --text-dim: #333;
      --radius: 18px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --glow: 0 0 0 1px rgba(255,255,255,0.04), 0 2px 8px rgba(0,0,0,0.4);
      --glow-hover: 0 0 0 1px rgba(255,255,255,0.07), 0 8px 32px rgba(0,0,0,0.6);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      background: rgba(8,8,8,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.8px;
      flex-shrink: 0;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--glow);
      overflow: hidden;
    }

    .logo-svg {
      width: 20px;
      height: 20px;
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .nav-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      min-width: 220px;
      text-align: center;
      letter-spacing: -0.2px;
    }

    .btn-icon {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text-muted);
      width: 32px; height: 32px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      box-shadow: var(--glow);
    }
    .btn-icon:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }

    .btn-today {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text-muted);
      padding: 5px 12px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      font-size: 12px; font-weight: 600;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
      letter-spacing: 0.1px;
      box-shadow: var(--glow);
    }
    .btn-today:hover { background: var(--surface3); color: var(--text); }

    .view-toggle {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: var(--glow);
    }
    .view-btn {
      padding: 5px 14px;
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border: none; background: transparent;
      font-family: inherit;
      transition: all 0.15s;
      letter-spacing: 0.1px;
    }
    .view-btn.active { background: var(--surface3); color: var(--text); }

    .btn-primary {
      background: var(--text);
      border: none; color: #080808;
      padding: 7px 16px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.15s;
      flex-shrink: 0; font-family: inherit;
      letter-spacing: -0.1px;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,255,255,0.1); }
    .btn-primary:active { transform: translateY(0); }

    /* ─── APP LAYOUT ─── */
    .app { display: flex; flex: 1; overflow: hidden; }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 210px;
      border-right: 1px solid var(--border);
      padding: 18px 14px;
      display: flex; flex-direction: column; gap: 22px;
      overflow-y: auto; flex-shrink: 0;
      background: var(--bg);
    }

    .mini-cal-header {
      font-size: 12px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .mini-cal-grid {
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 1px; margin-top: 10px;
    }
    .mini-cal-day-label {
      font-size: 9px; color: var(--text-dim);
      text-align: center; padding: 3px 0;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .mini-cal-day {
      font-size: 11px; text-align: center;
      padding: 5px 2px; border-radius: 6px;
      cursor: pointer; color: var(--text-muted);
      transition: all 0.1s; font-weight: 500;
    }
    .mini-cal-day:hover { background: var(--surface2); color: var(--text); }
    .mini-cal-day.today { background: var(--text); color: #080808; font-weight: 800; }
    .mini-cal-day.in-week { background: var(--surface2); }
    .mini-cal-day.selected-day { background: var(--surface3); color: var(--text); font-weight: 700; }
    .mini-cal-day.other-month { color: var(--text-dim); }

    .sidebar-section-title {
      font-size: 10px; font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .category-list { display: flex; flex-direction: column; gap: 2px; }
    .category-item {
      display: flex; align-items: center; gap: 9px;
      padding: 6px 8px; border-radius: 9px;
      cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text-muted);
      transition: all 0.1s;
    }
    .category-item:hover { background: var(--surface2); color: var(--text); }
    .category-item.active { background: var(--surface2); color: var(--text); }
    .category-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .category-count { margin-left: auto; font-size: 10px; color: var(--text-dim); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* ─── MAIN ─── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    /* ══ WEEK VIEW ══ */
    .week-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    .day-headers {
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 8px; padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
    }
    .day-header { text-align: center; cursor: pointer; border-radius: 10px; padding: 6px 4px; transition: background 0.1s; }
    .day-header:hover { background: var(--surface2); }
    .day-header-name {
      font-size: 10px; font-weight: 700;
      color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px;
    }
    .day-header-num {
      font-size: 18px; font-weight: 700; color: var(--text-muted);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; margin: 4px auto 0;
    }
    .day-header.today .day-header-name { color: var(--text-muted); }
    .day-header.today .day-header-num { background: var(--text); color: #080808; font-weight: 800; }

    .bento-grid {
      display: grid; grid-template-columns: repeat(7,1fr);
      gap: 8px; padding: 12px 16px 16px;
      flex: 1; overflow-y: auto; align-content: start;
    }
    .bento-col { display: flex; flex-direction: column; gap: 6px; min-height: 460px; }
    .bento-drop-zone {
      flex: 1; min-height: 44px;
      border: 1px dashed var(--border2);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 16px; font-weight: 300;
      cursor: pointer; transition: all 0.15s;
    }
    .bento-drop-zone:hover { border-color: var(--border2); background: var(--surface); color: var(--text-muted); }
    .bento-drop-zone.drag-over { border-color: rgba(255,255,255,0.2); background: var(--surface2); }

    /* ══ DAY VIEW ══ */
    .day-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    .day-view-header {
      padding: 16px 24px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .day-view-date { font-size: 24px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.1; }
    .day-view-date span { color: var(--text-muted); font-weight: 400; font-size: 18px; }
    .day-view-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

    .day-layout-toggle {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: var(--glow);
    }
    .day-layout-btn {
      padding: 6px 14px;
      font-size: 12px; font-weight: 600;
      color: var(--text-muted);
      cursor: pointer; border: none; background: transparent;
      font-family: inherit;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .day-layout-btn.active { background: var(--surface3); color: var(--text); }

    .day-view-body { flex: 1; overflow-y: auto; display: flex; }

    /* Timeline */
    .time-col {
      width: 58px; flex-shrink: 0;
      padding-top: 8px; border-right: 1px solid var(--border);
    }
    .time-slot-label {
      height: 64px;
      display: flex; align-items: flex-start; justify-content: flex-end;
      padding: 6px 10px 0 0;
      font-size: 10px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.2px;
    }
    .schedule-col { flex: 1; position: relative; padding: 8px 20px 40px; }
    .time-row {
      height: 64px; border-bottom: 1px solid var(--border);
      position: relative; cursor: pointer;
      transition: background 0.1s;
    }
    .time-row:hover { background: rgba(255,255,255,0.015); }

    .now-line {
      position: absolute; left: 0; right: 0; height: 1.5px;
      background: #f43f5e; z-index: 10; pointer-events: none;
    }
    .now-line::before {
      content: ''; position: absolute;
      left: -4px; top: -4px; width: 9px; height: 9px;
      border-radius: 50%; background: #f43f5e;
    }

    .day-block-timed {
      position: absolute; left: 0; right: 12px;
      border-radius: 12px; padding: 9px 12px;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.15s;
      z-index: 5; overflow: hidden;
    }
    .day-block-timed:hover { transform: translateX(3px); box-shadow: 0 6px 24px rgba(0,0,0,0.5); z-index: 6; }

    /* Bento mode (day) */
    .day-bento-wrap { flex: 1; padding: 20px 20px; overflow-y: auto; }
    .day-bento-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
      gap: 10px;
      align-content: start;
    }

    .day-bento-block {
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      min-height: 110px;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative;
      box-shadow: var(--glow);
    }
    .day-bento-block:hover { transform: translateY(-3px); box-shadow: var(--glow-hover); }
    .day-bento-block.completed { opacity: 0.38; }

    .day-bento-emoji { font-size: 26px; margin-bottom: 9px; display: block; line-height: 1; }
    .day-bento-title { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9); line-height: 1.35; }
    .day-bento-title.done { text-decoration: line-through; opacity: 0.55; }
    .day-bento-time { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 6px; font-weight: 500; font-variant-numeric: tabular-nums; }
    .day-bento-cat {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; padding: 2px 7px; border-radius: 4px;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.55);
      margin-top: 7px; display: inline-block;
    }
    .day-bento-notes { font-size: 10px; color: rgba(255,255,255,0.28); margin-top: 5px; line-height: 1.45; }

    .day-bento-block .block-actions {
      position: absolute; top: 8px; right: 8px;
      display: none; gap: 3px;
    }
    .day-bento-block:hover .block-actions { display: flex; }

    /* Unscheduled */
    .unscheduled-section { padding: 14px 20px; border-top: 1px solid var(--border); }
    .unscheduled-title {
      font-size: 10px; font-weight: 700; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
    }
    .unscheduled-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .unscheduled-block {
      border-radius: var(--radius-sm); padding: 7px 11px;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 7px;
      box-shadow: var(--glow);
    }
    .unscheduled-block:hover { transform: translateY(-1px); box-shadow: var(--glow-hover); }

    /* ─── SHARED BLOCK STYLES ─── */
    .block-emoji { font-size: 15px; flex-shrink: 0; line-height: 1; }
    .block-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.88); line-height: 1.35; }
    .block-title.done { text-decoration: line-through; opacity: 0.5; }
    .block-time-label { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; font-variant-numeric: tabular-nums; }
    .block-notes-preview { font-size: 10px; color: rgba(255,255,255,0.32); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .block-category-badge {
      font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
      padding: 2px 6px; border-radius: 4px;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
      margin-top: 4px; display: inline-block;
    }

    .block-actions { position: absolute; top: 6px; right: 6px; display: none; gap: 3px; }
    .bento-block:hover .block-actions,
    .day-block-timed:hover .block-actions { display: flex; }

    .block-action-btn {
      width: 21px; height: 21px; border-radius: 5px;
      background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6); font-size: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.1s; backdrop-filter: blur(4px);
    }
    .block-action-btn:hover { background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.9); }

    /* Week bento block */
    .bento-block {
      border-radius: var(--radius-sm); padding: 10px 11px;
      cursor: grab; position: relative;
      transition: all 0.15s;
      border: 1px solid transparent; user-select: none;
      box-shadow: var(--glow);
    }
    .bento-block:hover { transform: translateY(-2px); box-shadow: var(--glow-hover); }
    .bento-block.dragging { opacity: 0.35; cursor: grabbing; transform: scale(0.97); }
    .bento-block.completed { opacity: 0.38; }
    .block-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
    .block-time { font-size: 9px; color: rgba(255,255,255,0.45); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* ─── STATS BAR ─── */
    .stats-bar {
      padding: 9px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 20px; align-items: center; flex-shrink: 0;
      background: var(--bg);
    }
    .stat-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .stat-dot { width: 5px; height: 5px; border-radius: 50%; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 22px; padding: 26px;
      width: 430px; max-width: 92vw; max-height: 92vh; overflow-y: auto;
      transform: translateY(10px) scale(0.98); transition: all 0.2s;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 24px 80px rgba(0,0,0,0.7);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-title { font-size: 17px; font-weight: 800; margin-bottom: 20px; letter-spacing: -0.4px; }
    .form-group { margin-bottom: 13px; }
    .form-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 6px; display: block;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--radius-xs); color: var(--text); padding: 9px 11px;
      font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }
    .form-select option { background: var(--surface2); }
    .form-textarea { resize: vertical; min-height: 68px; line-height: 1.5; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .emoji-picker { display: grid; grid-template-columns: repeat(8,1fr); gap: 3px; margin-top: 5px; }
    .emoji-opt {
      font-size: 17px; text-align: center; padding: 5px; border-radius: 7px;
      cursor: pointer; transition: all 0.1s; line-height: 1.4;
    }
    .emoji-opt:hover { background: var(--surface3); transform: scale(1.1); }
    .emoji-opt.selected { background: var(--surface3); outline: 2px solid rgba(255,255,255,0.25); }
    .modal-footer { display: flex; gap: 7px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel {
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text-muted); padding: 8px 15px; border-radius: var(--radius-xs);
      cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500;
      transition: all 0.15s;
    }
    .btn-cancel:hover { background: var(--surface3); color: var(--text); }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-dim); gap: 12px;
    }
    .empty-state-icon { font-size: 44px; opacity: 0.6; }
    .empty-state-text { font-size: 13px; font-weight: 500; color: var(--text-muted); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .bento-block, .day-bento-block { animation: fadeIn 0.2s ease; }

    /* Color dot on timed blocks */
    .block-color-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; border-radius: 12px 0 0 12px;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">
      <!-- Kugi icon: 4 colored bento squares -->
      <svg class="logo-svg" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="8" height="8" rx="2.5" fill="#4f7cff"/>
        <rect x="11" y="1" width="8" height="8" rx="2.5" fill="#8b5cf6"/>
        <rect x="1" y="11" width="8" height="8" rx="2.5" fill="#10b981"/>
        <rect x="11" y="11" width="8" height="8" rx="2.5" fill="#f43f5e"/>
      </svg>
    </div>
    kugi
  </div>

  <div class="header-center">
    <button class="btn-icon" id="prev-btn">‹</button>
    <span class="nav-label" id="nav-label"></span>
    <button class="btn-icon" id="next-btn">›</button>
    <button class="btn-today" id="today-btn">Today</button>
  </div>

  <div style="display:flex;align-items:center;gap:8px;">
    <div class="view-toggle">
      <button class="view-btn active" id="view-week" onclick="setView('week')">Week</button>
      <button class="view-btn" id="view-day" onclick="setView('day')">Day</button>
    </div>
    <button class="btn-primary" id="add-btn">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      New Block
    </button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div>
      <div class="mini-cal-header" id="mini-cal-month"></div>
      <div class="mini-cal-grid" id="mini-cal-grid"></div>
    </div>
    <div>
      <div class="sidebar-section-title">Categories</div>
      <div class="category-list" id="category-list"></div>
    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<div class="stats-bar" id="stats-bar"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Block</div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="f-title" placeholder="What are you doing?" />
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="f-category">
        <option value="Work">💼 Work</option>
        <option value="Personal">🏠 Personal</option>
        <option value="Health">💪 Health</option>
        <option value="Deep Work">🧠 Deep Work</option>
        <option value="Social">🎉 Social</option>
        <option value="Admin">📋 Admin</option>
        <option value="Creative">🎨 Creative</option>
        <option value="Other">✨ Other</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" id="f-date" type="date" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start time</label>
        <input class="form-input" id="f-start" type="time" />
      </div>
      <div class="form-group">
        <label class="form-label">End time</label>
        <input class="form-input" id="f-end" type="time" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="f-notes" placeholder="Any extra context…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-save">Save Block</button>
    </div>
  </div>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────
const CATEGORIES = {
  'Work':      { color: '#4f7cff', emoji: '💼' },
  'Personal':  { color: '#f59e0b', emoji: '🏠' },
  'Health':    { color: '#10b981', emoji: '💪' },
  'Deep Work': { color: '#8b5cf6', emoji: '🧠' },
  'Social':    { color: '#f43f5e', emoji: '🎉' },
  'Admin':     { color: '#6b7280', emoji: '📋' },
  'Creative':  { color: '#ec4899', emoji: '🎨' },
  'Other':     { color: '#94a3b8', emoji: '✨' },
};
const EMOJIS = ['💼','🧠','💪','🎉','📋','🎨','✈️','📚','☕','🏃','🍎','💡','🔥','⚡','🎯','🎵','🏠','🌿','💻','📞','🤝','💰','🎓','🛒'];
const HOURS = Array.from({length:24},(_,i)=>i);

// ─── DB BRIDGE ───────────────────────────────────────────────
// window.kugiDB is injected by preload.js (Electron contextBridge).
// Falls back to localStorage for browser/dev use.
const DB = window.kugiDB || {
  async listBlocks() {
    return JSON.parse(localStorage.getItem('kugiBlocks') || '[]');
  },
  async createBlock(b) {
    const id = Math.random().toString(36).slice(2)+Date.now().toString(36);
    const all = JSON.parse(localStorage.getItem('kugiBlocks')||'[]');
    all.push({...b, id});
    localStorage.setItem('kugiBlocks', JSON.stringify(all));
    return id;
  },
  async updateBlock(id, fields) {
    const all = JSON.parse(localStorage.getItem('kugiBlocks')||'[]');
    const i = all.findIndex(b=>b.id===id);
    if(i>=0) all[i]={...all[i],...fields};
    localStorage.setItem('kugiBlocks', JSON.stringify(all));
  },
  async deleteBlock(id) {
    const all = JSON.parse(localStorage.getItem('kugiBlocks')||'[]').filter(b=>b.id!==id);
    localStorage.setItem('kugiBlocks', JSON.stringify(all));
  },
  async toggleComplete(id) {
    const all = JSON.parse(localStorage.getItem('kugiBlocks')||'[]');
    const b = all.find(b=>b.id===id);
    if(b) b.completed = !b.completed;
    localStorage.setItem('kugiBlocks', JSON.stringify(all));
  },
  async bulkCreate(bs) {
    const all = JSON.parse(localStorage.getItem('kugiBlocks')||'[]');
    bs.forEach(b=>all.push({...b,id:Math.random().toString(36).slice(2)+Date.now().toString(36)}));
    localStorage.setItem('kugiBlocks', JSON.stringify(all));
  },
  onBlocksChanged(cb) { /* no-op for localStorage fallback */ },
};

// Normalize Convex doc (_id → id) for UI code
function normalize(b) {
  return { ...b, id: b._id || b.id };
}

// ─── STATE ───────────────────────────────────────────────────
let blocks = [];
let currentWeekStart = getWeekStart(new Date());
let currentDay = new Date(); currentDay.setHours(0,0,0,0);
let view = 'week';
let dayLayout = 'timeline';
let dragId = null;
let editingId = null;
let selectedEmoji = '💼';
let activeCategory = null;

// ─── UTILS ───────────────────────────────────────────────────
function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
  d.setHours(0,0,0,0);
  return d;
}
function addDays(date, n) { const d = new Date(date); d.setDate(d.getDate()+n); return d; }
function toDateStr(date) { return date.toISOString().split('T')[0]; }
function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function isToday(date) { return toDateStr(date) === toDateStr(today()); }
function getColor(cat) { return (CATEGORIES[cat]||CATEGORIES['Other']).color; }
function hexRgb(hex) {
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}
function getWeekDays() { return Array.from({length:7},(_,i)=>addDays(currentWeekStart,i)); }
function formatShort(date) { return date.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function formatFull(date) { return date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
function timeToMins(t) { if(!t) return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
function minsToPx(m) { return (m/60)*64; }
function catEmoji(cat) { return (CATEGORIES[cat]||CATEGORIES['Other']).emoji; }

// ─── VIEW ────────────────────────────────────────────────────
function setView(v) {
  view = v;
  document.getElementById('view-week').classList.toggle('active', v==='week');
  document.getElementById('view-day').classList.toggle('active', v==='day');
  render();
}
function setDayLayout(l) { dayLayout = l; render(); }

// ─── NAV ─────────────────────────────────────────────────────
document.getElementById('prev-btn').onclick = () => {
  if (view==='week') currentWeekStart = addDays(currentWeekStart,-7);
  else currentDay = addDays(currentDay,-1);
  render();
};
document.getElementById('next-btn').onclick = () => {
  if (view==='week') currentWeekStart = addDays(currentWeekStart,7);
  else currentDay = addDays(currentDay,1);
  render();
};
document.getElementById('today-btn').onclick = () => {
  currentWeekStart = getWeekStart(new Date());
  currentDay = today();
  render();
};
document.getElementById('add-btn').onclick = () => {
  openModal(null, view==='day' ? toDateStr(currentDay) : toDateStr(today()));
};

// ─── RENDER ──────────────────────────────────────────────────
function render() {
  renderSidebar();
  renderStats();
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  if (view==='week') {
    const days = getWeekDays();
    document.getElementById('nav-label').textContent =
      `${formatShort(days[0])} – ${formatShort(days[6])}, ${days[0].getFullYear()}`;
    main.appendChild(buildWeekView());
  } else {
    document.getElementById('nav-label').textContent = formatFull(currentDay);
    main.appendChild(buildDayView());
  }
}

// ══ WEEK VIEW ══
function buildWeekView() {
  const wrap = document.createElement('div');
  wrap.className = 'week-view';

  const headers = document.createElement('div');
  headers.className = 'day-headers';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach((name,i) => {
    const d = getWeekDays()[i];
    const div = document.createElement('div');
    div.className = 'day-header'+(isToday(d)?' today':'');
    div.innerHTML = `<div class="day-header-name">${name}</div><div class="day-header-num">${d.getDate()}</div>`;
    div.onclick = () => { currentDay = d; setView('day'); };
    headers.appendChild(div);
  });
  wrap.appendChild(headers);

  const grid = document.createElement('div');
  grid.className = 'bento-grid';
  getWeekDays().forEach(day => {
    const dateStr = toDateStr(day);
    const col = document.createElement('div');
    col.className = 'bento-col';
    blocks
      .filter(b=>b.date===dateStr&&(!activeCategory||b.category===activeCategory))
      .sort((a,b)=>(a.start_time||'').localeCompare(b.start_time||''))
      .forEach(b=>col.appendChild(makeWeekBlock(b)));

    const drop = document.createElement('div');
    drop.className = 'bento-drop-zone';
    drop.textContent = '+';
    drop.onclick = ()=>openModal(null,dateStr);
    drop.ondragover = e=>{ e.preventDefault(); drop.classList.add('drag-over'); };
    drop.ondragleave = ()=>drop.classList.remove('drag-over');
    drop.ondrop = e=>{ e.preventDefault(); drop.classList.remove('drag-over');
      if(dragId){ DB.updateBlock(dragId,{date:dateStr}).then(loadAndRender); dragId=null; }
    };
    col.appendChild(drop);
    grid.appendChild(col);
  });
  wrap.appendChild(grid);
  return wrap;
}

function makeWeekBlock(block) {
  const color = getColor(block.category);
  const div = document.createElement('div');
  div.className = 'bento-block'+(block.completed?' completed':'');
  div.draggable = true;
  div.style.background = `rgba(${hexRgb(color)},0.14)`;
  div.style.borderColor = `rgba(${hexRgb(color)},0.28)`;
  div.style.borderLeft = `3px solid rgba(${hexRgb(color)},0.7)`;
  const time = block.start_time?`${block.start_time}${block.end_time?' – '+block.end_time:''}`:'' ;
  div.innerHTML = `
    <span style="display:block;font-size:15px;margin-bottom:5px;line-height:1;">${block.emoji||catEmoji(block.category)}</span>
    <div class="block-title${block.completed?' done':''}">${block.title}</div>
    <div class="block-meta">
      ${time?`<span class="block-time">${time}</span>`:''}
      <span class="block-category-badge">${block.category}</span>
    </div>
    <div class="block-actions">
      <button class="block-action-btn" data-id="${block.id}" data-action="complete" title="${block.completed?'Undo':'Complete'}">${block.completed?'↩':'✓'}</button>
      <button class="block-action-btn" data-id="${block.id}" data-action="edit" title="Edit">✎</button>
      <button class="block-action-btn" data-id="${block.id}" data-action="delete" title="Delete">✕</button>
    </div>`;
  div.ondragstart = ()=>{ dragId=block.id; div.classList.add('dragging'); };
  div.ondragend = ()=>{ dragId=null; div.classList.remove('dragging'); };
  attachActions(div);
  div.onclick = ()=>openModal(block.id);
  return div;
}

// ══ DAY VIEW ══
function buildDayView() {
  const dateStr = toDateStr(currentDay);
  const dayBlocks = blocks
    .filter(b=>b.date===dateStr&&(!activeCategory||b.category===activeCategory))
    .sort((a,b)=>(a.start_time||'').localeCompare(b.start_time||''));
  const timed = dayBlocks.filter(b=>b.start_time);
  const untimed = dayBlocks.filter(b=>!b.start_time);

  const wrap = document.createElement('div');
  wrap.className = 'day-view';

  const dh = document.createElement('div');
  dh.className = 'day-view-header';
  const dayName = currentDay.toLocaleDateString('en-US',{weekday:'long'});
  const dateLabel = currentDay.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const todayTag = isToday(currentDay)?` <span style="font-size:13px;color:var(--text-muted);font-weight:500;">— Today</span>`:'';

  dh.innerHTML = `
    <div>
      <div class="day-view-date">${dayName}${todayTag}<br><span>${dateLabel}</span></div>
      <div class="day-view-subtitle">${dayBlocks.length} block${dayBlocks.length!==1?'s':''} · ${dayBlocks.filter(b=>b.completed).length} completed</div>
    </div>
    <div class="day-layout-toggle">
      <button class="day-layout-btn${dayLayout==='timeline'?' active':''}" onclick="setDayLayout('timeline')">⏱ Timeline</button>
      <button class="day-layout-btn${dayLayout==='bento'?' active':''}" onclick="setDayLayout('bento')">⊞ Bento</button>
    </div>`;
  wrap.appendChild(dh);

  if (dayLayout === 'timeline') {
    wrap.appendChild(buildTimelineBody(timed, untimed, dateStr));
  } else {
    wrap.appendChild(buildBentoBody(dayBlocks, dateStr));
  }
  return wrap;
}

function buildTimelineBody(timed, untimed, dateStr) {
  const frag = document.createDocumentFragment();

  const body = document.createElement('div');
  body.className = 'day-view-body';

  const timeCol = document.createElement('div');
  timeCol.className = 'time-col';
  HOURS.forEach(h => {
    const el = document.createElement('div');
    el.className = 'time-slot-label';
    el.textContent = h===0?'':h<10?` ${h}:00`:`${h}:00`;
    timeCol.appendChild(el);
  });
  body.appendChild(timeCol);

  const schedCol = document.createElement('div');
  schedCol.className = 'schedule-col';
  HOURS.forEach(h => {
    const row = document.createElement('div');
    row.className = 'time-row';
    row.onclick = ()=>{
      openModal(null,dateStr);
      setTimeout(()=>{
        document.getElementById('f-start').value=`${String(h).padStart(2,'0')}:00`;
        document.getElementById('f-end').value=`${String(Math.min(h+1,23)).padStart(2,'0')}:00`;
      },50);
    };
    schedCol.appendChild(row);
  });

  if (isToday(new Date(dateStr))) {
    const now = new Date();
    const nl = document.createElement('div');
    nl.className = 'now-line';
    nl.style.top = `${minsToPx(now.getHours()*60+now.getMinutes())}px`;
    schedCol.appendChild(nl);
  }

  timed.forEach(block => {
    const color = getColor(block.category);
    const startM = timeToMins(block.start_time);
    const endM = block.end_time ? timeToMins(block.end_time) : startM+60;
    const height = Math.max(minsToPx(endM-startM), 32);
    const el = document.createElement('div');
    el.className = 'day-block-timed'+(block.completed?' completed':'');
    el.style.cssText = `top:${minsToPx(startM)}px;height:${height}px;background:rgba(${hexRgb(color)},0.18);border-color:rgba(${hexRgb(color)},0.4);border-left:3px solid ${color};position:absolute;left:0;right:12px;`;
    const dur = endM-startM;
    const showBadge = height>50, showNotes = height>76&&block.notes;
    el.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:7px;">
        <span class="block-emoji">${block.emoji||catEmoji(block.category)}</span>
        <div style="flex:1;min-width:0;">
          <div class="block-title${block.completed?' done':''}">${block.title}</div>
          <div class="block-time-label">${block.start_time} – ${block.end_time||'?'} · ${dur}m</div>
          ${showNotes?`<div class="block-notes-preview">${block.notes}</div>`:''}
          ${showBadge?`<span class="block-category-badge">${block.category}</span>`:''}
        </div>
      </div>
      <div class="block-actions">
        <button class="block-action-btn" data-id="${block.id}" data-action="complete">${block.completed?'↩':'✓'}</button>
        <button class="block-action-btn" data-id="${block.id}" data-action="edit">✎</button>
        <button class="block-action-btn" data-id="${block.id}" data-action="delete">✕</button>
      </div>`;
    attachActions(el);
    el.onclick = e=>{ if(!e.target.classList.contains('block-action-btn')) openModal(block.id); };
    schedCol.appendChild(el);
  });

  body.appendChild(schedCol);
  frag.appendChild(body);

  if (untimed.length > 0) {
    const us = document.createElement('div');
    us.className = 'unscheduled-section';
    us.innerHTML = `<div class="unscheduled-title">📌 Unscheduled (${untimed.length})</div>`;
    const ug = document.createElement('div');
    ug.className = 'unscheduled-grid';
    untimed.forEach(block => {
      const color = getColor(block.category);
      const el = document.createElement('div');
      el.className = 'unscheduled-block';
      el.style.background = `rgba(${hexRgb(color)},0.14)`;
      el.style.borderColor = `rgba(${hexRgb(color)},0.3)`;
      el.innerHTML = `<span class="block-emoji">${block.emoji||catEmoji(block.category)}</span><div><div class="block-title${block.completed?' done':''}">${block.title}</div><span class="block-category-badge">${block.category}</span></div>`;
      el.onclick = ()=>openModal(block.id);
      ug.appendChild(el);
    });
    us.appendChild(ug);
    frag.appendChild(us);
  }

  return frag;
}

function buildBentoBody(dayBlocks, dateStr) {
  if (dayBlocks.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <div class="empty-state-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="3" y="3" width="19" height="19" rx="5" fill="rgba(79,124,255,0.25)"/><rect x="26" y="3" width="19" height="19" rx="5" fill="rgba(139,92,246,0.25)"/><rect x="3" y="26" width="19" height="19" rx="5" fill="rgba(16,185,129,0.25)"/><rect x="26" y="26" width="19" height="19" rx="5" fill="rgba(244,63,94,0.25)"/></svg>
      </div>
      <div class="empty-state-text">Nothing here. Add a block to get started.</div>`;
    return empty;
  }

  const wrap = document.createElement('div');
  wrap.className = 'day-bento-wrap';

  const grid = document.createElement('div');
  grid.className = 'day-bento-grid';

  dayBlocks.forEach(block => {
    const color = getColor(block.category);
    const el = document.createElement('div');
    el.className = 'day-bento-block'+(block.completed?' completed':'');
    el.style.background = `rgba(${hexRgb(color)},0.15)`;
    el.style.borderColor = `rgba(${hexRgb(color)},0.32)`;
    el.style.borderLeft = `4px solid rgba(${hexRgb(color)},0.7)`;
    const time = block.start_time ? `${block.start_time}${block.end_time?' – '+block.end_time:''}` : 'No time set';
    el.innerHTML = `
      <div>
        <span class="day-bento-emoji">${block.emoji||catEmoji(block.category)}</span>
        <div class="day-bento-title${block.completed?' done':''}">${block.title}</div>
        ${block.notes?`<div class="day-bento-notes">${block.notes}</div>`:''}
      </div>
      <div>
        <div class="day-bento-time">${time}</div>
        <span class="day-bento-cat">${block.category}</span>
      </div>
      <div class="block-actions">
        <button class="block-action-btn" data-id="${block.id}" data-action="complete">${block.completed?'↩':'✓'}</button>
        <button class="block-action-btn" data-id="${block.id}" data-action="edit">✎</button>
        <button class="block-action-btn" data-id="${block.id}" data-action="delete">✕</button>
      </div>`;
    attachActions(el);
    el.onclick = e=>{ if(!e.target.classList.contains('block-action-btn')) openModal(block.id); };
    grid.appendChild(el);
  });

  const addCard = document.createElement('div');
  addCard.style.cssText = `border-radius:var(--radius);border:1px dashed var(--border2);min-height:110px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);transition:all 0.15s;`;
  addCard.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
  addCard.onmouseenter = ()=>{ addCard.style.background='var(--surface)'; addCard.style.borderColor='var(--border2)'; addCard.style.color='var(--text-muted)'; };
  addCard.onmouseleave = ()=>{ addCard.style.background=''; addCard.style.borderColor='var(--border2)'; addCard.style.color='var(--text-dim)'; };
  addCard.onclick = ()=>openModal(null, dateStr);
  grid.appendChild(addCard);

  wrap.appendChild(grid);
  return wrap;
}

// ─── BLOCK ACTIONS ───────────────────────────────────────────
function attachActions(el) {
  el.querySelectorAll('.block-action-btn').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const {id, action} = btn.dataset;
      if (action==='delete') { DB.deleteBlock(id).then(loadAndRender); }
      else if (action==='complete') { DB.toggleComplete(id).then(loadAndRender); }
      else if (action==='edit') { openModal(id); }
    };
  });
}

// ─── SIDEBAR ─────────────────────────────────────────────────
function renderSidebar() {
  const ref = view==='week' ? currentWeekStart : currentDay;
  const monthStart = new Date(ref.getFullYear(),ref.getMonth(),1);
  const monthEnd = new Date(ref.getFullYear(),ref.getMonth()+1,0);
  document.getElementById('mini-cal-month').textContent =
    ref.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const grid = document.getElementById('mini-cal-grid');
  grid.innerHTML = '';
  ['M','T','W','T','F','S','S'].forEach(l=>{
    const el=document.createElement('div'); el.className='mini-cal-day-label'; el.textContent=l; grid.appendChild(el);
  });
  let startDow = monthStart.getDay(); startDow = startDow===0?6:startDow-1;
  for(let i=0;i<startDow;i++){
    const el=document.createElement('div'); el.className='mini-cal-day other-month';
    const d=new Date(monthStart); d.setDate(d.getDate()-(startDow-i)); el.textContent=d.getDate(); grid.appendChild(el);
  }
  const weekDates = view==='week'?getWeekDays().map(toDateStr):[];
  for(let d=1;d<=monthEnd.getDate();d++){
    const date=new Date(ref.getFullYear(),ref.getMonth(),d);
    const el=document.createElement('div'); el.className='mini-cal-day';
    if(isToday(date)) el.classList.add('today');
    else if(view==='day'&&toDateStr(date)===toDateStr(currentDay)) el.classList.add('selected-day');
    else if(view==='week'&&weekDates.includes(toDateStr(date))) el.classList.add('in-week');
    el.textContent=d;
    el.onclick=()=>{ currentDay=date; currentWeekStart=getWeekStart(date); render(); };
    grid.appendChild(el);
  }

  const catList = document.getElementById('category-list');
  catList.innerHTML = '';
  const allItem = document.createElement('div');
  allItem.className='category-item'+(!activeCategory?' active':'');
  allItem.innerHTML=`<span class="category-dot" style="background:#555"></span>All<span class="category-count">${blocks.length}</span>`;
  allItem.onclick=()=>{activeCategory=null;render();};
  catList.appendChild(allItem);
  Object.entries(CATEGORIES).forEach(([cat,info])=>{
    const count=blocks.filter(b=>b.category===cat).length;
    if(!count&&activeCategory!==cat)return;
    const item=document.createElement('div');
    item.className='category-item'+(activeCategory===cat?' active':'');
    item.innerHTML=`<span class="category-dot" style="background:${info.color}"></span>${cat}<span class="category-count">${count}</span>`;
    item.onclick=()=>{activeCategory=activeCategory===cat?null:cat;render();};
    catList.appendChild(item);
  });
}

// ─── STATS ───────────────────────────────────────────────────
function renderStats() {
  const scopeBlocks = view==='week'
    ? blocks.filter(b=>getWeekDays().map(toDateStr).includes(b.date))
    : blocks.filter(b=>b.date===toDateStr(currentDay));
  const done=scopeBlocks.filter(b=>b.completed).length, total=scopeBlocks.length;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-item"><span class="stat-dot" style="background:#10b981"></span>${done} completed</div>
    <div class="stat-item"><span class="stat-dot" style="background:#4f7cff"></span>${total-done} remaining</div>
    <div class="stat-item"><span class="stat-dot" style="background:#8b5cf6"></span>${total} total${view==='week'?' this week':' today'}</div>
    ${total>0?`<div class="stat-item" style="margin-left:auto;gap:8px;">
      <div style="width:80px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:#10b981;border-radius:2px;transition:width 0.4s;"></div>
      </div>
      <span style="font-size:11px;font-weight:600;color:var(--text-muted);font-variant-numeric:tabular-nums;">${pct}%</span>
    </div>`:''}`;
}

// ─── MODAL ───────────────────────────────────────────────────
function openModal(id=null, preDate=null) {
  editingId = id;
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML='';
  EMOJIS.forEach(em=>{
    const el=document.createElement('div');
    el.className='emoji-opt'+(em===selectedEmoji?' selected':'');
    el.textContent=em;
    el.onclick=()=>{selectedEmoji=em;picker.querySelectorAll('.emoji-opt').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');};
    picker.appendChild(el);
  });
  if(id){
    const b=blocks.find(b=>b.id===id);
    document.getElementById('modal-title').textContent='Edit Block';
    document.getElementById('f-title').value=b.title||'';
    document.getElementById('f-category').value=b.category||'Work';
    document.getElementById('f-date').value=b.date||'';
    document.getElementById('f-start').value=b.start_time||'';
    document.getElementById('f-end').value=b.end_time||'';
    document.getElementById('f-notes').value=b.notes||'';
    selectedEmoji=b.emoji||'💼';
  } else {
    document.getElementById('modal-title').textContent='New Block';
    document.getElementById('f-title').value='';
    document.getElementById('f-category').value='Work';
    document.getElementById('f-date').value=preDate||toDateStr(today());
    document.getElementById('f-start').value='';
    document.getElementById('f-end').value='';
    document.getElementById('f-notes').value='';
    selectedEmoji='💼';
  }
  // refresh picker to show selected
  picker.querySelectorAll('.emoji-opt').forEach(el=>{
    el.classList.toggle('selected', el.textContent===selectedEmoji);
  });
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),80);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editingId=null; }

async function saveBlock() {
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  const data={
    title, emoji:selectedEmoji,
    category:document.getElementById('f-category').value,
    date:document.getElementById('f-date').value,
    start_time:document.getElementById('f-start').value,
    end_time:document.getElementById('f-end').value,
    notes:document.getElementById('f-notes').value.trim(),
  };
  closeModal();
  if(editingId){ await DB.updateBlock(editingId, data); }
  else { await DB.createBlock({...data, completed:false}); }
  await loadAndRender();
}

document.getElementById('modal-cancel').onclick=closeModal;
document.getElementById('modal-save').onclick=saveBlock;
document.getElementById('modal-overlay').onclick=e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();};
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(!document.getElementById('modal-overlay').classList.contains('open')){
    if(e.key==='n')openModal(null,view==='day'?toDateStr(currentDay):toDateStr(today()));
    if(e.key==='w')setView('week');
    if(e.key==='d')setView('day');
    if(e.key==='t'&&view==='day')setDayLayout('timeline');
    if(e.key==='b'&&view==='day')setDayLayout('bento');
  }
});

// ─── LOAD & RENDER ───────────────────────────────────────────
async function loadAndRender() {
  const raw = await DB.listBlocks();
  blocks = raw.map(normalize);
  render();
}

// ─── REAL-TIME SUBSCRIPTION ──────────────────────────────────
DB.onBlocksChanged(updated => {
  blocks = updated.map(normalize);
  render();
});

// ─── BOOT ────────────────────────────────────────────────────
async function boot() {
  if (window.kugiDB) {
    const savedUrl = await window.kugiDB.getConvexUrl();
    if (!savedUrl) {
      showSetupScreen();
      return;
    }
  }
  loadAndRender();
  setInterval(()=>{if(view==='day'&&isToday(currentDay)&&dayLayout==='timeline')loadAndRender();},60000);
}

    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  await window.kugiDB.setConvexUrl(url);
