name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Package Electron app (${{ matrix.arch }})
        working-directory: app
        run: npx electron-builder --mac --${{ matrix.arch }} --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create DMG (${{ matrix.arch }})
        working-directory: app
        run: |
          echo "dist contents:"; ls dist/
          APP=$(find dist -name "*.app" | head -1)
          echo "Found app: $APP"
          VERSION=$(node -p "require('./package.json').version")
          DMG="dist/Kugi-${VERSION}-${{ matrix.arch }}.dmg"
          hdiutil create \
            -volname "Kugi" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG"
          echo "DMG_PATH=$DMG" >> $GITHUB_ENV
          echo "DMG_NAME=Kugi-${VERSION}-${{ matrix.arch }}.dmg" >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kugi-${{ matrix.arch }}-dmg
          path: app/${{ env.DMG_PATH }}

  release:
    needs: build-mac
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download x64 DMG
        uses: actions/download-artifact@v4
        with:
          name: Kugi-x64-dmg
          path: dist/

      - name: Download arm64 DMG
        uses: actions/download-artifact@v4
        with:
          name: Kugi-arm64-dmg
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
